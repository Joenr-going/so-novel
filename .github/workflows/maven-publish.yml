name: Maven Package

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          server-id: github
          settings-path: ${{ github.workspace }}
          cache: maven

      - name: Show Java version
        run: |
          java -version
          javac -version
          mvn -version

      - name: Build with Maven
        run: mvn -B clean package --file pom.xml -Dmaven.test.skip=true -DskipTests -DskipITs

      - name: Publish to GitHub Packages Apache Maven
        run: mvn -B deploy -Dmaven.test.skip=true -DskipTests -DskipITs -s $GITHUB_WORKSPACE/settings.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
